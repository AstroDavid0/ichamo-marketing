        body {

        /* Reglas forzadas para clientes que soportan CSS en head */
        a[href^="mailto"],
        a[href^="tel"],
        a[href^="http"],
        a[href^="https"] {
            color: #d4e9ff !important;
            text-decoration: none !important;
        }

        /* Dark Mode específico */
        @media (prefers-color-scheme: dark) {
            .dark-mode-text {
                color: #d4e9ff !important;
            }

            .dark-mode-bg {
                background: linear-gradient(90deg, #009999 0%, #0044cc 100%) !important;
            }

            /* TÉCNICA DEFINITIVA PARA LOGOS BLANCOS SIN RECTÁNGULOS */
            .white-on-dark {
                /* 1. Grayscale: Elimina el color.
                   2. Contrast(0): Aplana todo a gris medio.
                   3. Brightness(200%): Empuja ese gris a blanco puro.
                   NO usamos invert() para evitar invertir el fondo.
                */
                filter: grayscale(100%) contrast(0%) brightness(200%) !important;
                background-color: transparent !important;
                /* Seguridad extra */
            }
        }

        /* Soporte para Outlook App */
        [data-ogsc] .dark-mode-text {
            color: #d4e9ff !important;
        }

        [data-ogsc] .white-on-dark {
            filter: grayscale(100%) contrast(0%) brightness(200%) !important;
            background-color: transparent !important;
        }
    </style>
</head>
